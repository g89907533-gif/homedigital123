<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المنتجات - لوحة الإدارة</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display-all" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg-primary: #0A2F2F;
            --glass-bg: rgba(12, 45, 45, 0.65);
            --glass-border: 0.5px solid rgba(247, 249, 249, 0.15);
            --glass-blur: blur(40px) saturate(210%) brightness(1.1);
            --ios-orange: #FF9F1C;
            --ios-green: #2EC4B6;
            --ios-red: #E71D36;
            --ios-label-primary: #F7F9F9;
            --ios-label-secondary: rgba(247, 249, 249, 0.8);
            --ios-spring: cubic-bezier(0.25, 1, 0.2, 1);
            --radius-xl: 28px;
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', 'Cairo', -apple-system, sans-serif;
        }

        body {
            background: var(--ios-bg-primary);
            color: var(--ios-label-primary);
            direction: rtl;
            min-height: 100vh;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
        }

        .admin-header {
            background: rgba(10, 47, 47, 0.95);
            backdrop-filter: blur(60px);
            border-bottom: var(--glass-border);
            padding: 16px 24px;
            padding-top: calc(16px + var(--sat));
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header h1 {
            font-size: 20px;
            color: var(--ios-orange);
        }

        .back-btn {
            background: rgba(247, 249, 249, 0.1);
            color: var(--ios-label-primary);
            border: var(--glass-border);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .search-box {
            margin-bottom: 24px;
        }

        .ios-input {
            width: 100%;
            background: rgba(247, 249, 249, 0.1);
            border: var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            color: var(--ios-label-primary);
            font-size: 16px;
        }

        .products-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-item {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            transition: all 0.3s;
        }

        .product-item:hover {
            transform: translateX(-5px);
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 159, 28, 0.3);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .product-meta {
            color: var(--ios-label-secondary);
            font-size: 13px;
        }

        .product-price {
            color: var(--ios-orange);
            font-weight: 700;
            margin-top: 4px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .btn-delete {
            background: rgba(231, 29, 54, 0.2);
            color: var(--ios-red);
            border: 1px solid rgba(231, 29, 54, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: rgba(231, 29, 54, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-label-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 60, 60, 0.95);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin.html" class="back-btn">← رجوع</a>
        <h1>📦 المنتجات</h1>
        <div style="width: 60px;"></div>
    </header>

    <div class="admin-content">
        <div class="search-box">
            <input type="text" class="ios-input" placeholder="🔍 البحث في المنتجات..." oninput="searchProducts(this.value)">
        </div>

        <div id="productsList" class="products-list">
            <div class="empty-state">
                <div class="empty-state-icon">⏳</div>
                <h3>جاري تحميل المنتجات...</h3>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            deleteDoc, 
            onSnapshot,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2f4rJBBBOe6qfa2EU1WfspUB5uibgwnM",
            authDomain: "hussain-1290b.firebaseapp.com",
            projectId: "hussain-1290b",
            storageBucket: "hussain-1290b.firebasestorage.app",
            messagingSenderId: "798281706738",
            appId: "1:798281706738:web:79314f6feb2add0bf5f46b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let products = [];

        // Check auth
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin.html';
        }

        // Load products
        const productsQuery = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(productsQuery, (snapshot) => {
            products = [];
            snapshot.forEach((doc) => {
                if (doc.id !== "init") {
                    products.push({ id: doc.id, ...doc.data() });
                }
            });
            renderProducts();
        });

        function renderProducts() {
            const list = document.getElementById('productsList');

            if (products.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <h3>لا توجد منتجات</h3>
                    </div>
                `;
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="product-item" data-name="${p.name.toLowerCase()}">
                    ${p.images?.[0] ? 
                        `<img src="${p.images[0]}" class="product-img" onerror="this.style.display='none'">` : 
                        '<div style="width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center;">📦</div>'
                    }
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-meta">${p.cat}${p.subCat ? ' > ' + p.subCat : ''}${p.itemId ? ' | معرف: ' + p.itemId : ''}</div>
                        <div class="product-price">${p.priceIQD ? p.priceIQD.toLocaleString() + ' د.ع' : ''}</div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-delete" onclick="deleteProduct('${p.id}')">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        window.searchProducts = function(query) {
            const items = document.querySelectorAll('.product-item');
            const lowerQuery = query.toLowerCase();

            items.forEach(item => {
                const name = item.dataset.name;
                item.style.display = name.includes(lowerQuery) ? 'flex' : 'none';
            });
        };

        window.deleteProduct = async function(id) {
            if (!confirm("هل أنت متأكد من حذف هذا المنتج؟")) return;

            try {
                await deleteDoc(doc(db, "products", id));
                showToast("تم حذف المنتج");
            } catch (error) {
                console.error("Delete error:", error);
                showToast("حدث خطأ");
            }
        };

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
